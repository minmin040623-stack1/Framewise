<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FrameWise | Result</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/result.css">

</head>

<body>

<header class="result-header">

    <div class="container">

        <a href="index.html" class="logo">

            📷 FrameWise

        </a>

    </div>

</header>

<main class="result-page">

<div class="container">

<div class="result-card">

<h1>Your AI Analysis</h1>

<p class="subtitle">

Composition evaluation completed.

</p>

<div class="score-circle">

<span id="scoreValue">92</span>

</div>

<h2 id="gradeText">

Excellent!

</h2>

<div class="feedback-list">

<div class="feedback good">

✔ Subject placement is excellent.

</div>

<div class="feedback good">

✔ Strong visual balance.

</div>

<div class="feedback normal">

△ Crop slightly tighter.

</div>

<div class="feedback bad">

✖ Too much empty space.

</div>

</div>

<button id="nextBtn" class="primary-button">

<div class="crop-preview">

    <h3>Your Crop</h3>

    <img
        id="croppedPreview"
        src=""
        alt="Your cropped image">

</div>

Next Challenge

</button>

</div>

</div>

</main>

<script src="js/result.js"></script>

</body>

</html>
